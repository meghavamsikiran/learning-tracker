spring:
  application:
    name: learning-tracker

  # ── Database ──────────────────────────────────────────────
  # Local dev: H2 file database (no setup required)
  # Production: Set DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD env vars
  #             pointing to your Supabase PostgreSQL instance
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/learningtracker;AUTO_SERVER=TRUE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}

  # ── JPA / Hibernate ──────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true
    open-in-view: false

  # ── H2 Console (dev only) ────────────────────────────────
  h2:
    console:
      enabled: ${H2_CONSOLE:true}
      path: /h2-console

# ── Server ──────────────────────────────────────────────────
server:
  port: ${PORT:8085}

# ── CORS ────────────────────────────────────────────────────
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── Logging ─────────────────────────────────────────────────
logging:
  level:
    com.megha.learningtracker: DEBUG
    org.hibernate.SQL: WARN
